<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Adaptive Learning Engine</title><style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:1rem;background:#f9fcff;} .card{background:white;border-radius:24px;padding:1.8rem;box-shadow:0 8px 20px rgba(0,0,0,0.05);} button{background:#2a5298;color:white;border:none;padding:0.6rem 1.2rem;border-radius:40px;cursor:pointer;margin-top:1rem;} .question{font-size:1.4rem;margin:1rem 0;} .options{display:flex;gap:1rem;flex-wrap:wrap;} .opt{background:#eef2ff;padding:0.6rem 1rem;border-radius:40px;cursor:pointer;} .opt:hover{background:#cddcff;} .feedback{font-weight:bold;margin-top:1rem;} .difficulty{color:#2563eb;}</style></head>
<body>
<div class="card"><h1>📘 Adaptive Learning</h1><p>Your answers adjust next questions → harder or easier.</p>
<div id="quizArea"><div id="question" class="question"></div><div id="options" class="options"></div></div>
<div id="feedback" class="feedback"></div><div id="level" class="difficulty"></div>
<button id="resetBtn">⟳ Reset & restart</button><br><a href="index.html" style="display:inline-block;margin-top:1.5rem;">← Back to Dashboard</a></div>
<script>
    let level = "medium"; // easy, medium, hard
    let qIndex = 0;
    const questions = {
        easy: [{q:"What is 5 + 3 ?", options:["6","7","8","9"], correct:2},{q:"Capital of France?", options:["Berlin","Madrid","Paris","Lisbon"], correct:2}],
        medium: [{q:"Solve: 12 × 4", options:["36","48","52","44"], correct:1},{q:"Which planet is known as Red Planet?", options:["Mars","Jupiter","Venus","Saturn"], correct:0}],
        hard: [{q:"Integral of 2x dx ?", options:["x² + C","2x + C","x²","2"], correct:0},{q:"Who wrote 'Pride and Prejudice'?", options:["Dickens","Austen","Bronte","Hemingway"], correct:1}]
    };
    function loadQuestion(){
        let qs = questions[level];
        if(qIndex >= qs.length) qIndex = 0;
        let qdata = qs[qIndex];
        document.getElementById("question").innerText = qdata.q;
        let optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        qdata.options.forEach((opt,idx)=>{
            let btn = document.createElement("div"); btn.className="opt"; btn.innerText=opt;
            btn.onclick = ()=> checkAnswer(idx, qdata.correct);
            optsDiv.appendChild(btn);
        });
        document.getElementById("level").innerHTML = `🧠 Current difficulty: ${level.toUpperCase()}`;
        document.getElementById("feedback").innerHTML = "";
    }
    function checkAnswer(selected, correct){
        if(selected === correct){
            document.getElementById("feedback").innerHTML = "✅ Correct! Level might increase.";
            if(level === "easy") level = "medium";
            else if(level === "medium") level = "hard";
            else document.getElementById("feedback").innerHTML += " 🔥 Master level!";
        } else {
            document.getElementById("feedback").innerHTML = "❌ Incorrect. Level decreases for practice.";
            if(level === "hard") level = "medium";
            else if(level === "medium") level = "easy";
        }
        qIndex++;
        loadQuestion();
    }
    document.getElementById("resetBtn").onclick = ()=>{ level="medium"; qIndex=0; loadQuestion(); };
    loadQuestion();
</script>
</body>
</html>
